services:
  # Backend Node.js
  - type: web
    name: tvu-backend-node
    env: docker
    dockerfilePath: ./backend-node/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://tvu-frontend.onrender.com,https://tvu-backend-node.onrender.com,http://localhost:5173
      - key: LOG_LEVEL
        value: info

  # Frontend (Web Service with Docker)
  - type: web
    name: tvu-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: VITE_API_URL
        value: https://tvu-backend-node.onrender.com/api
      - key: VITE_APP_NAME
        value: TVU GDQP-AN Admin Portal
