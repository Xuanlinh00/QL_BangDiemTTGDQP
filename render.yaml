services:
  # PostgreSQL Database
  - type: pserv
    name: tvu-postgres
    env: docker
    plan: free
    dockerfilePath: ./render/Dockerfile.postgres
    envVars:
      - key: POSTGRES_USER
        value: admin
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: tvu_gdqp_admin

  # MongoDB Database (External - use MongoDB Atlas free tier)
  # Redis (External - use Redis Cloud free tier or Upstash)

  # Backend Node.js
  - type: web
    name: tvu-backend-node
    env: docker
    dockerfilePath: ./backend-node/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: tvu-postgres
          property: connectionString
      - key: MONGODB_URI
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://tvu-frontend.onrender.com,http://localhost:5173
      - key: PYTHON_WORKER_URL
        value: https://tvu-backend-python.onrender.com

  # Backend Python
  - type: web
    name: tvu-backend-python
    env: docker
    dockerfilePath: ./backend-python/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: tvu_documents
      - key: TESSERACT_PATH
        value: /usr/bin/tesseract
      - key: OCR_LANGUAGE
        value: vie
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: 8000

  # Frontend (Static Site)
  - type: web
    name: tvu-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://tvu-backend-node.onrender.com/api
      - key: VITE_PYTHON_API_URL
        value: https://tvu-backend-python.onrender.com
      - key: VITE_APP_NAME
        value: TVU GDQP-AN Admin Portal
