<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="95" fill="white" stroke="#1E3A5F" stroke-width="5"/>
  
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1E3A5F" stroke-width="2"/>
  
  <!-- Top arc text background -->
  <defs>
    <path id="topTextPath" d="M 30 100 A 70 70 0 0 1 170 100" fill="none"/>
    <path id="bottomTextPath" d="M 30 100 A 70 70 0 0 0 170 100" fill="none"/>
  </defs>
  
  <!-- Top text - TRƯỜNG ĐẠI HỌC TRÀ VINH -->
  <text fill="#1E3A5F" font-family="Arial, sans-serif" font-weight="bold" font-size="14">
    <textPath href="#topTextPath" startOffset="50%" text-anchor="middle">
      TRƯỜNG ĐẠI HỌC TRÀ VINH
    </textPath>
  </text>
  
  <!-- Bottom text - TRA VINH UNIVERSITY -->
  <text fill="#1E3A5F" font-family="Arial, sans-serif" font-weight="bold" font-size="12">
    <textPath href="#bottomTextPath" startOffset="50%" text-anchor="middle">
      TRA VINH UNIVERSITY
    </textPath>
  </text>
  
  <!-- Curved accent line above TVU -->
  <path d="M 50 85 Q 100 55 150 85" fill="none" stroke="#1E3A5F" stroke-width="6" stroke-linecap="round"/>
  
  <!-- TVU text -->
  <text x="100" y="130" text-anchor="middle" fill="#1E3A5F" font-family="Arial, sans-serif" font-weight="bold" font-size="50">
    TVU
  </text>
</svg>
