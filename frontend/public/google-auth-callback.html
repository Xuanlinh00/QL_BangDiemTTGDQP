<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Google Auth – Đang xử lý...</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9fafb; }
    .card { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e5e7eb; border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <p>Đang xác thực Google Drive...</p>
  </div>
  <script>
    (function () {
      // Google implicit grant returns the token in the URL hash (#access_token=…)
      var hash = window.location.hash.substring(1);
      if (!hash) {
        hash = window.location.search.substring(1);
      }

      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var expiresIn = params.get('expires_in');

      if (accessToken) {
        // Lưu token vào sessionStorage
        sessionStorage.setItem('gdrive_access_token', accessToken);
        if (expiresIn) {
          var expiry = Date.now() + parseInt(expiresIn) * 1000;
          sessionStorage.setItem('gdrive_token_expiry', expiry.toString());
        }
      }

      // Quay về trang cũ hoặc trang documents
      var returnUrl = sessionStorage.getItem('gdrive_return_url');
      sessionStorage.removeItem('gdrive_return_url');
      window.location.href = returnUrl || '/documents';
    })();
  </script>
</body>
</html>
